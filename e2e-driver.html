<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>e2e</title></head><body>
<iframe id="app" src="/" style="width:1200px;height:800px"></iframe>
<script>
const results = [];
function report(name, ok, detail) {
  results.push(`${ok ? 'PASS' : 'FAIL'} ${name}${detail ? ' — ' + detail : ''}`);
}
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function run() {
  const frame = document.getElementById('app');
  const win = frame.contentWindow;

  // Wait for app init
  for (let i = 0; i < 100 && !win.clarityEditor; i++) await sleep(100);
  if (!win.clarityEditor) { report('boot', false, 'clarityEditor never appeared'); return done(); }
  report('boot', true);
  await sleep(300);

  const view = win.clarityEditor;
  const doc = () => view.state.doc.toString();

  // Test 1: editing master volume in text flows through the debounced
  // parse into the store (audio params aren't assertable while the
  // headless context is suspended)
  const idx = doc().indexOf('  volume 80');
  if (idx < 0) { report('find master volume line', false, JSON.stringify(doc().slice(0, 80))); return done(); }
  view.dispatch({ changes: { from: idx + 9, to: idx + 11, insert: '40' } });
  await sleep(400);
  const storedVolume = win.audioEngine.store.getTriggerAttribute('master', 'volume');
  report('text edit -> parsed into store', storedVolume === 40, `volume=${JSON.stringify(storedVolume)}`);

  // Test 2: parse errors appear in the status strip ('note' without a
  // name is a hard error)
  const end = view.state.doc.length;
  view.dispatch({ changes: { from: end, insert: '\nnote' } });
  await sleep(300);
  const statusEl = win.document.getElementById('parse-status');
  const shown = statusEl && !statusEl.classList.contains('hidden') && /line \d+/.test(statusEl.textContent);
  report('parse error surfaced', !!shown, statusEl ? JSON.stringify(statusEl.textContent.slice(0, 60)) : 'no status el');

  // Lint diagnostics render squiggles/gutter markers (lint delay ~300ms)
  await sleep(700);
  const marks = win.document.querySelectorAll('.cm-lintRange-error, .cm-lint-marker-error').length;
  report('lint diagnostics rendered', marks > 0, `markers=${marks}`);

  // Test 3: removing the bad line clears the error
  view.dispatch({ changes: { from: end, to: view.state.doc.length } });
  await sleep(300);
  const cleared = statusEl && statusEl.classList.contains('hidden');
  report('deleting bad line clears error', !!cleared, `hidden=${cleared}`);

  // Test 4: cursor on the lfo line focuses the lfo panel section
  const lfoIdx = doc().indexOf('lfo vibrato');
  view.dispatch({ selection: { anchor: lfoIdx + 3 } });
  await sleep(300);
  const h2s = [...win.document.querySelectorAll('#oscillators-container h2')].map(h => h.textContent);
  report('cursor focuses lfo panel', h2s.some(t => t.includes('vibrato')), JSON.stringify(h2s));

  // Test 5: panel write-back — simulate uiGenerator calling the bridge
  const ok = win.updateTextFromUIChange('lfo', 'vibrato', 'wave', 'square');
  await sleep(300);
  report('panel write-back edits text', ok && doc().includes('  wave square'), `returned=${ok}`);

  // Test 6: Claude panel opens, drags, and persists position
  const fab = win.document.getElementById('claude-fab');
  if (!fab) {
    report('claude panel drag', false, 'no FAB (endpoint down?)');
  } else {
    fab.click();
    await sleep(200);
    const panel = win.document.getElementById('claude-panel');
    const head = panel.querySelector('.claude-head');
    const r0 = panel.getBoundingClientRect();
    const opts = (x, y) => ({ clientX: x, clientY: y, bubbles: true, pointerId: 7 });
    head.dispatchEvent(new win.PointerEvent('pointerdown', opts(r0.left + 50, r0.top + 10)));
    head.dispatchEvent(new win.PointerEvent('pointermove', opts(r0.left - 70, r0.top - 40)));
    head.dispatchEvent(new win.PointerEvent('pointerup', opts(r0.left - 70, r0.top - 40)));
    await sleep(100);
    const r1 = panel.getBoundingClientRect();
    const movedOk = panel.style.left !== '' &&
      Math.abs(r1.left - (r0.left - 120)) < 5 && Math.abs(r1.top - (r0.top - 50)) < 5;
    const persisted = (JSON.parse(win.localStorage.getItem('clarity.claude-chat') || '{}').pos || null) !== null;
    report('claude panel drags + persists', movedOk && persisted,
      `dx=${(r1.left - r0.left).toFixed(0)} dy=${(r1.top - r0.top).toFixed(0)} persisted=${persisted}`);
    fab.click();
  }

  done();
}

function done() {
  console.log('E2E_RESULTS\n' + results.join('\n') + '\nE2E_END');
}
run().catch(e => { report('fatal', false, String(e)); done(); });
</script>
</body></html>
